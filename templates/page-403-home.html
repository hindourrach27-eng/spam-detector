{% extends "layouts/base-fullscreen.html" %}

{% block title %} Error 403 {% endblock %}

{% block stylesheets %}{% endblock stylesheets %}

{% block content %}
    <div class="error-box">
        <div class="error-body text-center">
            <h1 class="error-title">403</h1>
            <h3 class="text-uppercase error-subtitle">Accès refusé !</h3>
            <p class="text-muted mt-4 mb-4"></p>
            <a href="/" class="btn btn-info btn-rounded waves-effect waves-light mb-5">Retour à l'accueil</a>
        </div>
    </div>
{% endblock content %}

{% block javascripts %}
    <script>
        $('[data-toggle="tooltip"]').tooltip();
        $(".preloader").fadeOut();
    </script>
{% endblock javascripts %}
